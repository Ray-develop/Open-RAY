<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>Open-RAY - Math-AI</title>


  <link rel="stylesheet" href="styles.css">

  <link rel="stylesheet" href="chatbot.css">
</head>
<body>

<header class="topbar">
  <div class="logo" data-link="home">OPEN-RAY</div>
  <nav class="nav">
    <span data-link="home">HOME</span>
    <span data-link="definicions">DEFINICIONS</span>
    <span data-link="tutorials">TUTORIALS</span>
    <span data-link="exercicis">EXERCICIS</span>
    <span data-link="contacte">CONTACTE</span>
    <span data-link="mathai">MATH-AI</span>
  </nav>
</header>

<main class="page">
  <h1>Math-AI</h1>

  <div class="chat-box">
    <p>Aquí anirà el chatbot matemàtic.</p>
  </div>

  <div class="nav-buttons">
    <button id="btn-prev">Anterior</button>
    <button id="btn-next">Següent</button>
  </div>
</main>


<button id="chat-toggle">💬</button>

<div id="chatbot-widget" style="display:none;">
  <div id="chat-header">Ray-AI</div>

  <div id="chat-body">
    <div class="message bot">
      Hola! Sóc Ray‑AI. Aquesta és la meva primera versió i puc ajudar-te amb coses senzilles d’HTML, CSS i JavaScript. En què et puc ajudar?
    </div>
  </div>

  <div id="chat-input">
    <input type="text" id="user-input" placeholder="Escriu una pregunta..." />
    <button onclick="enviaMissatge()">📨</button>
  </div>
</div>
<script src="script.js"></script>


<script src="chatbot.js"></script>

</body>
</html>
